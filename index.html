<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B.Ed. I Year Notes</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
    <link rel="stylesheet" href="style.css">
    
    <meta name="theme-color" content="#6a11cb">
</head>
<body>

<div id="splash">

    <div class="splash-content">

        <div class="splash-icon">📚</div>

        <h1>B.Ed. I Year Notes</h1>

        <p>Loading...</p>

    </div>

</div>

<div class="circle c1"></div>
<div class="circle c2"></div>
<div class="circle c3"></div>

<div class="container">

    <div class="top-bar">
        <button id="themeToggle">🌙 Dark Mode</button>
    </div>

    <!-- Home Screen -->
    <div id="homeScreen">
        <div class="home-icon">📚</div>
        <h1>B.Ed. I Year Notes</h1>
        <p class="home-subtitle">First year notes, all in one place</p>
        <button id="enterBtn" onclick="enterApp()">Enter →</button>
    </div>

    <!-- Notes Section (hidden until Enter is clicked) -->
    <div id="notesSection" class="hidden">

    <h1>📚 B.Ed. I Year Notes</h1>

    <p id="subjectCount"></p>

    <div class="notes-grid">

        <div class="note-card">
        
        <h2 onclick="toggleCard(this.parentElement)">
            <span class="arrow">▼</span>Childhood & Growing Up</h2>

            <div class="actions">

                <button
                    class="preview-btn"
                    aria-label="View Childhood & Growing Up PDF"
                    onclick="previewPDF('childhood_growing_up.pdf')">
                    👁️ View
                </button>
            
               <button
                    class="download-btn"
                    aria-label="Download Childhood & Growing Up PDF"
                    onclick="downloadPDF('childhood_growing_up.pdf')">
                    ⬇️ Download
               </button>
            
               <button
                    class="share-btn"
                    aria-label="Share Childhood & Growing Up PDF"
                    onclick="shareFile('childhood_growing_up.pdf')">
                    🔗 Share
               </button>

            </div>
        </div>

        <div class="note-card">
        
        <h2 onclick="toggleCard(this.parentElement)">
            <span class="arrow">▼</span>Contemporary India & Education</h2>

            <div class="actions">

                <button
                    class="preview-btn"
                    aria-label="View Contemporary India & Education PDF"
                    onclick="previewPDF('contemporary_india_education.pdf')">
                    👁️ View
                </button>
            
               <button
                    class="download-btn"
                    aria-label="Download Contemporary India & Education PDF"
                    onclick="downloadPDF('contemporary_india_education.pdf')">
                    ⬇️ Download
               </button>
            
               <button
                    class="share-btn"
                    aria-label="Share Contemporary India & Education PDF"
                    onclick="shareFile('contemporary_india_education.pdf')">
                    🔗 Share
               </button>

            </div>
        </div>

         <div class="note-card">
        
         <h2 onclick="toggleCard(this.parentElement)">
            <span class="arrow">▼</span>Learning & Teaching</h2>

             <div class="actions">

                <button
                    class="preview-btn"
                    aria-label="View Learning & Teaching PDF"
                    onclick="previewPDF('learning_teaching.pdf')">
                    👁️ View
                </button>
            
                <button
                    class="download-btn"
                    aria-label="Download Learning & Teaching PDF"
                    onclick="downloadPDF('learning_teaching.pdf')">
                    ⬇️ Download
               </button>
            
               <button
                    class="share-btn"
                    aria-label="Share Learning & Teaching PDF"
                    onclick="shareFile('learning_teaching.pdf')">
                    🔗 Share
               </button>

            </div>
        </div>

         <div class="note-card">
        
         <h2 onclick="toggleCard(this.parentElement)">
            <span class="arrow">▼</span>Language Across the Curriculum</h2>

            <div class="actions">

                <button
                    class="preview-btn"
                    aria-label="View Language Across the Curriculum PDF"
                    onclick="previewPDF('language_across_the_curriculum.pdf')">
                    👁️ View
                </button>
            
               <button
                    class="download-btn"
                    aria-label="Download Language Across the Curriculum PDF"
                    onclick="downloadPDF('language_across_the_curriculum.pdf')">
                    ⬇️ Download
               </button>
            
               <button
                    class="share-btn"
                    aria-label="Share Language Across the Curriculum PDF"
                    onclick="shareFile('language_across_the_curriculum.pdf')">
                    🔗 Share
               </button>

            </div>
        </div>

            <div class="note-card">
        
            <h2 onclick="toggleCard(this.parentElement)">
            <span class="arrow">▼</span>Pedagogy of English</h2>
            
                <div class="actions">
            
                    <button class="preview-btn">
                        👁️ View
                    </button>
            
                    <button class="download-btn">
                        ⬇️ Download
                    </button>
            
                    <button class="share-btn">
                        🔗 Share
                    </button>
            
                 </div>
            </div>

            <div class="note-card">
        
            <h2 onclick="toggleCard(this.parentElement)">
            <span class="arrow">▼</span>Pedagogy of Political Science</h2>
            
                <div class="actions">
            
                    <button
                    class="preview-btn"

               </button>
            
               <button
                    class="share-btn"
                    aria-label="Share Pedagogy of Political Science PDF"
                    onclick="shareFile('pedagogy_of_political_science.pdf')">
                    🔗 Share
               </button>
            
                 </div>
            </div>

    </div><!-- end notes-grid -->

    </div><!-- end notesSection -->

</div><!-- end container -->

<button id="topBtn">↑</button>

<div id="toast"></div>

<script src="script.js"></script>
