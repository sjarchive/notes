<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>B.Ed. I Year Notes</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash">
        <div class="splash-content">
            <div class="splash-icon">📚</div>
            <h1>B.Ed. I Year Notes</h1>
            <p>Loading...</p>
        </div>
    </div>

    <!-- Background blobs -->
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>

    <div class="container">

        <div class="top-bar">
            <button id="themeToggle">🌙 Dark Mode</button>
        </div>

        <!-- Home Screen -->
        <div id="homeScreen">
            <div class="home-icon">📚</div>
            <h1>B.Ed. I Year Notes</h1>
            <p class="home-subtitle">First year notes, all in one place</p>
            <button id="enterBtn" onclick="enterApp()">Enter →</button>
        </div>

        <!-- Notes Section -->
        <div id="notesSection" class="hidden">

            <h1>📚 B.Ed. I Year Notes</h1>
            <p id="subjectCount"></p>

            <div class="notes-grid">

                <!-- Repeat this card pattern per subject -->
                <div class="note-card">
                    <h2 onclick="toggleCard(this)">
                        <span class="arrow">▼</span>
                        Childhood &amp; Growing Up
                    </h2>
                    <div class="actions">
                        <button class="preview-btn"  onclick="previewPDF('pdfs/childhood.pdf')">👁️ View</button>
                        <button class="download-btn" onclick="downloadPDF('pdfs/childhood.pdf')">⬇️ Download</button>
                        <button class="share-btn"    onclick="shareFile('pdfs/childhood.pdf')">🔗 Share</button>
                    </div>
                </div>

                <div class="note-card">
                    <h2 onclick="toggleCard(this)">
                        <span class="arrow">▼</span>
                        Contemporary India &amp; Education
                    </h2>
                    <div class="actions">
                        <button class="preview-btn"  onclick="previewPDF('pdfs/contemporary-india.pdf')">👁️ View</button>
                        <button class="download-btn" onclick="downloadPDF('pdfs/contemporary-india.pdf')">⬇️ Download</button>
                        <button class="share-btn"    onclick="shareFile('pdfs/contemporary-india.pdf')">🔗 Share</button>
                    </div>
                </div>

                <div class="note-card">
                    <h2 onclick="toggleCard(this)">
                        <span class="arrow">▼</span>
                        Learning &amp; Teaching
                    </h2>
                    <div class="actions">
                        <button class="preview-btn"  onclick="previewPDF('pdfs/learning-teaching.pdf')">👁️ View</button>
                        <button class="download-btn" onclick="downloadPDF('pdfs/learning-teaching.pdf')">⬇️ Download</button>
                        <button class="share-btn"    onclick="shareFile('pdfs/learning-teaching.pdf')">🔗 Share</button>
                    </div>
                </div>

                <div class="note-card">
                    <h2 onclick="toggleCard(this)">
                        <span class="arrow">▼</span>
                        Language Across the Curriculum
                    </h2>
                    <div class="actions">
                        <button class="preview-btn"  onclick="previewPDF('pdfs/language-curriculum.pdf')">👁️ View</button>
                        <button class="download-btn" onclick="downloadPDF('pdfs/language-curriculum.pdf')">⬇️ Download</button>
                        <button class="share-btn"    onclick="shareFile('pdfs/language-curriculum.pdf')">🔗 Share</button>
                    </div>
                </div>

                <div class="note-card">
                    <h2 onclick="toggleCard(this)">
                        <span class="arrow">▼</span>
                        Pedagogy of English
                    </h2>
                    <div class="actions">
                        <button class="preview-btn"  onclick="previewPDF('pdfs/pedagogy-english.pdf')">👁️ View</button>
                        <button class="download-btn" onclick="downloadPDF('pdfs/pedagogy-english.pdf')">⬇️ Download</button>
                        <button class="share-btn"    onclick="shareFile('pdfs/pedagogy-english.pdf')">🔗 Share</button>
                    </div>
                </div>

                <div class="note-card">
                    <h2 onclick="toggleCard(this)">
                        <span class="arrow">▼</span>
                        Pedagogy of Political Science
                    </h2>
                    <div class="actions">
                        <button class="preview-btn"  onclick="previewPDF('pdfs/pedagogy-polsci.pdf')">👁️ View</button>
                        <button class="download-btn" onclick="downloadPDF('pdfs/pedagogy-polsci.pdf')">⬇️ Download</button>
                        <button class="share-btn"    onclick="shareFile('pdfs/pedagogy-polsci.pdf')">🔗 Share</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Scroll-to-top button -->
    <button id="topBtn">↑</button>

    <!-- Toast -->
    <div id="toast"></div>

    <script src="script.js"></script>
</body>
</html>
